<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #d8f3b3;
            color: #1c2d1c;
        }
        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: #111111;
            border-radius: 22px;
            padding: 30px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
            color: white;
            position: relative;
        }
        .card h1 {
            margin: 0 0 10px;
            font-size: 34px;
            text-align: center;
        }
        .card p {
            margin: 0 0 28px;
            text-align: center;
            color: #c7c7c7;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #a9b6a9;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #2b3a2b;
            background: #171717;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #6bbf4f;
        }
        .button-row {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .button-login {
            display: block;
            width: 100%;
            padding: 14px;
            background: #ffffff;
            border: none;
            border-radius: 12px;
            color: #1c2d1c;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }
        .button-login:hover {
            background: #e4e4e4;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            color: white;
            text-decoration: none;
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.25);
        }
        .top-title {
            display: block;
            text-align: center;
            margin-bottom: 24px;
        }
        .top-title span {
            color: #82d166;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <a class="back-link" href="../Herbal%20menu/index.html">←</a>
            <div class="top-title">
                <div style="font-size: 20px; color: #7da45d;">Admin</div>
                <div style="font-size: 32px; font-weight: bold;">Profile</div>
            </div>
            <h1>Login</h1>
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" placeholder="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="Password">
            </div>
            <div class="button-row">
                <button class="button-login" type="button">Log in</button>
            </div>
        </div>
    </div>
</body>
</html>
