<!DOCTYPE html>
<html lang="en">
<head>

    <title>Herbal Medicine</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #222222;
            text-align: center;
        }
        .top-bar {
            position: relative;
